global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http_front
    bind *:80
    default_backend django_backends

backend django_backends
    balance roundrobin
    option httpchk GET /api/health/
    http-check expect status 200
    server web1 web:8000 check inter 2s fall 3 rise 2
    server web2 web2:8000 check inter 2s fall 3 rise 2
    server web3 web3:8000 check inter 2s fall 3 rise 2

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
