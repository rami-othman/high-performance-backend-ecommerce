{% extends "ui/base.html" %}

{% block title %}Products | E-Commerce UI{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="h3 mb-1">Products</h1>
        <p class="text-muted mb-0">Browse products and add quantities to your cart.</p>
    </div>
    <a class="btn btn-outline-secondary" href="/ui/cart/">View Cart</a>
</div>
<div id="message"></div>
<div id="products" class="row g-3"></div>
{% endblock %}

{% block scripts %}
<script>
    requireAuth();

    function renderProducts(products) {
        const container = document.getElementById("products");
        if (!products.length) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-info">No products found. Run the seed script first.</div></div>`;
            return;
        }

        container.innerHTML = products.map((product) => `
            <div class="col-md-6 col-xl-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <h2 class="h5">${escapeHtml(product.name)}</h2>
                        <p class="text-muted flex-grow-1">${escapeHtml(product.description || "No description.")}</p>
                        <div class="mb-2"><strong>Price:</strong> $${product.price}</div>
                        <div class="mb-3"><strong>Stock:</strong> ${product.stock}</div>
                        <div class="input-group">
                            <input class="form-control" id="qty-${product.id}" type="number" min="1" max="${product.stock}" value="1">
                            <button class="btn btn-primary" onclick="addToCart(${product.id})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join("");
    }

    async function loadProducts() {
        const response = await apiFetch("/api/products/");
        const data = await readJsonResponse(response);
        if (!response.ok) {
            showAlert(data.detail || "Could not load products.");
            return;
        }
        renderProducts(data.results || data);
    }

    async function addToCart(productId) {
        const quantity = Number(document.getElementById(`qty-${productId}`).value || 1);
        const response = await apiFetch("/api/cart/items/", {
            method: "POST",
            body: JSON.stringify({product: productId, quantity})
        });
        const data = await readJsonResponse(response);
        if (!response.ok) {
            showAlert(data.detail || JSON.stringify(data));
            return;
        }
        showAlert("Product added to cart.", "success");
    }

    loadProducts();
</script>
{% endblock %}
