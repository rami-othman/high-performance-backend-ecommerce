<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}E-Commerce UI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/ui/dashboard/">E-Commerce Engine</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/ui/products/">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ui/cart/">Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ui/orders/">Orders</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ui/dashboard/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ui/login/">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ui/logout/">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script>
        const ACCESS_TOKEN_KEY = "ecommerce_access_token";
        const REFRESH_TOKEN_KEY = "ecommerce_refresh_token";

        function getAccessToken() {
            return localStorage.getItem(ACCESS_TOKEN_KEY);
        }

        function getRefreshToken() {
            return localStorage.getItem(REFRESH_TOKEN_KEY);
        }

        function saveTokens(data) {
            localStorage.setItem(ACCESS_TOKEN_KEY, data.access);
            localStorage.setItem(REFRESH_TOKEN_KEY, data.refresh);
        }

        function clearTokens() {
            localStorage.removeItem(ACCESS_TOKEN_KEY);
            localStorage.removeItem(REFRESH_TOKEN_KEY);
        }

        function requireAuth() {
            if (!getAccessToken()) {
                window.location.href = "/ui/login/";
            }
        }

        function showAlert(message, type = "danger") {
            const target = document.getElementById("message");
            if (!target) return;
            target.innerHTML = `<div class="alert alert-${type}" role="alert">${escapeHtml(message)}</div>`;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function refreshAccessToken() {
            const refresh = getRefreshToken();
            if (!refresh) return false;

            const response = await fetch("/api/auth/token/refresh/", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({refresh})
            });

            if (!response.ok) {
                clearTokens();
                return false;
            }

            const data = await response.json();
            localStorage.setItem(ACCESS_TOKEN_KEY, data.access);
            return true;
        }

        async function apiFetch(url, options = {}, retry = true) {
            const headers = new Headers(options.headers || {});
            const token = getAccessToken();

            if (token) {
                headers.set("Authorization", `Bearer ${token}`);
            }

            if (options.body && !(options.body instanceof FormData)) {
                headers.set("Content-Type", "application/json");
            }

            const response = await fetch(url, {...options, headers});

            if (response.status === 401 && retry) {
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    return apiFetch(url, options, false);
                }
                window.location.href = "/ui/login/";
            }

            return response;
        }

        async function readJsonResponse(response) {
            const text = await response.text();
            if (!text) return {};
            try {
                return JSON.parse(text);
            } catch (error) {
                return {detail: text};
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
